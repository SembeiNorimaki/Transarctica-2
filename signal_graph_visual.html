<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Signal Graph</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#f8f8f6;color:#1a1a18;font-size:13px}
@media(prefers-color-scheme:dark){
  body{background:#111110;color:#e8e6e0}
}
.toolbar{display:flex;align-items:center;gap:8px;padding:10px 16px;flex-wrap:wrap;
         border-bottom:1px solid #e0ddd6;background:#fff}
@media(prefers-color-scheme:dark){
  .toolbar{background:#1a1a18;border-bottom-color:#2e2e2a}
}
h1{font-size:14px;font-weight:600;color:#333;margin-right:6px;white-space:nowrap}
@media(prefers-color-scheme:dark){h1{color:#e0ddd6}}
.filter-btn{padding:3px 11px;border-radius:14px;border:1px solid #ccc;background:transparent;
            font-size:12px;cursor:pointer;color:#555;transition:all .15s}
.filter-btn.active{color:#fff;border-color:transparent;background:#185FA5}
.filter-btn:hover:not(.active){border-color:#888;color:#222}
@media(prefers-color-scheme:dark){
  .filter-btn{border-color:#3a3a36;color:#999}
  .filter-btn.active{background:#3b82f6}
  .filter-btn:hover:not(.active){border-color:#777;color:#eee}
}
.wrap{position:relative;overflow-x:auto;overflow-y:hidden}
canvas{display:block;cursor:default}
.tooltip{position:fixed;background:#fff;border:1px solid #ddd;border-radius:8px;
         padding:10px 14px;font-size:12px;pointer-events:none;display:none;
         max-width:270px;z-index:100;line-height:1.75;
         box-shadow:0 4px 20px rgba(0,0,0,.12)}
.tooltip b{display:block;font-weight:600;font-size:13px;margin-bottom:2px}
.tip-cat{color:#888;font-size:11px;margin-bottom:6px}
.tip-sec{font-weight:600;margin-top:6px;margin-bottom:2px;font-size:11px;
         text-transform:uppercase;letter-spacing:.04em;color:#666}
.tip-row{color:#333;padding-left:6px}
.tip-sig{color:#777;padding-left:18px;font-size:11px}
@media(prefers-color-scheme:dark){
  .tooltip{background:#1e1e1c;border-color:#3a3a36;color:#ddd;
           box-shadow:0 4px 20px rgba(0,0,0,.6)}
  .tip-cat{color:#777}
  .tip-sec{color:#888}
  .tip-row{color:#ccc}
  .tip-sig{color:#666}
}
.legend{display:flex;flex-wrap:wrap;gap:10px;padding:10px 16px;font-size:11px;
        color:#777;border-top:1px solid #e0ddd6;background:#fff}
@media(prefers-color-scheme:dark){
  .legend{background:#1a1a18;border-top-color:#2e2e2a;color:#888}
}
.leg{display:flex;align-items:center;gap:5px}
.leg-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
</style>
</head>
<body>

<div class="toolbar">
  <h1>&#9889; Signal Flow</h1>
  <button class="filter-btn active" onclick="setFilter('all')">All</button>
  <button class="filter-btn" onclick="setFilter("Scenes")">Scenes</button>
  <button class="filter-btn" onclick="setFilter("Managers")">Managers</button>
  <button class="filter-btn" onclick="setFilter("Components")">Components</button>
  <button class="filter-btn" onclick="setFilter("Entities")">Entities</button>
  <button class="filter-btn" onclick="setFilter("Inventories")">Inventories</button>
  <button class="filter-btn" onclick="setFilter("UI")">UI</button>
  <button class="filter-btn" onclick="setFilter("State Machines")">State Machines</button>
</div>

<div class="wrap">
  <canvas id="c"></canvas>
  <div class="tooltip" id="tip"></div>
</div>

<div class="legend">
  <div class="leg"><div class="leg-dot" style="background:#4338CA"></div>Scenes</div>
  <div class="leg"><div class="leg-dot" style="background:#185FA5"></div>Managers</div>
  <div class="leg"><div class="leg-dot" style="background:#B45309"></div>Components</div>
  <div class="leg"><div class="leg-dot" style="background:#7C3AED"></div>Entities</div>
  <div class="leg"><div class="leg-dot" style="background:#BE185D"></div>Inventories</div>
  <div class="leg"><div class="leg-dot" style="background:#C2410C"></div>UI</div>
  <div class="leg"><div class="leg-dot" style="background:#15803D"></div>State Machines</div>
</div>

<script>
const DARK = matchMedia('(prefers-color-scheme:dark)').matches;
const CAT_L = {"Scenes": {"fill": "#EEF2FF", "stroke": "#4338CA", "text": "#3730A3"}, "Managers": {"fill": "#E6F1FB", "stroke": "#185FA5", "text": "#0C447C"}, "Services": {"fill": "#E1F5EE", "stroke": "#0F6E56", "text": "#085041"}, "Components": {"fill": "#FEF3C7", "stroke": "#B45309", "text": "#78350F"}, "Entities": {"fill": "#F5F3FF", "stroke": "#7C3AED", "text": "#5B21B6"}, "Inventories": {"fill": "#FDF2F8", "stroke": "#BE185D", "text": "#9D174D"}, "UI": {"fill": "#FFF7ED", "stroke": "#C2410C", "text": "#9A3412"}, "State Machines": {"fill": "#F0FDF4", "stroke": "#15803D", "text": "#14532D"}, "Other": {"fill": "#F1EFE8", "stroke": "#5F5E5A", "text": "#444441"}};
const CAT_D = {"Scenes": {"fill": "#1E1B4B", "stroke": "#818CF8", "text": "#A5B4FC"}, "Managers": {"fill": "#0C2340", "stroke": "#60A5FA", "text": "#93C5FD"}, "Services": {"fill": "#052E20", "stroke": "#34D399", "text": "#6EE7B7"}, "Components": {"fill": "#2D1B00", "stroke": "#FCD34D", "text": "#FDE68A"}, "Entities": {"fill": "#1E0A3D", "stroke": "#A78BFA", "text": "#C4B5FD"}, "Inventories": {"fill": "#2D0A1E", "stroke": "#F472B6", "text": "#FBCFE8"}, "UI": {"fill": "#2D1208", "stroke": "#FB923C", "text": "#FED7AA"}, "State Machines": {"fill": "#052210", "stroke": "#4ADE80", "text": "#BBF7D0"}, "Other": {"fill": "#1C1C1A", "stroke": "#9CA3AF", "text": "#D1D5DB"}};
const C = DARK ? CAT_D : CAT_L;

const NW = 168, NH = 32;
const FULL_W = 1542, FULL_H = 310;

const NODES = [{"id": "ap_component", "label": "ap_component", "cat": "Components", "x": 452, "y": 40}, {"id": "building_manager", "label": "building_manager", "cat": "Managers", "x": 236, "y": 40}, {"id": "city_inventory", "label": "city_inventory", "cat": "Inventories", "x": 884, "y": 40}, {"id": "combat_scene", "label": "combat_scene", "cat": "Scenes", "x": 20, "y": 40}, {"id": "faction_ai", "label": "faction_ai", "cat": "Managers", "x": 236, "y": 80}, {"id": "health_component", "label": "health_component", "cat": "Components", "x": 452, "y": 80}, {"id": "hurtbox_component", "label": "hurtbox_component", "cat": "Components", "x": 452, "y": 120}, {"id": "navigation_hud", "label": "navigation_hud", "cat": "UI", "x": 1100, "y": 40}, {"id": "navigation_locomotive", "label": "navigation_locomotive", "cat": "Entities", "x": 668, "y": 40}, {"id": "navigation_scene", "label": "navigation_scene", "cat": "Scenes", "x": 20, "y": 80}, {"id": "navigation_train", "label": "navigation_train", "cat": "Entities", "x": 668, "y": 80}, {"id": "navigation_wagon", "label": "navigation_wagon", "cat": "Entities", "x": 668, "y": 120}, {"id": "quest_manager", "label": "quest_manager", "cat": "Managers", "x": 236, "y": 120}, {"id": "quest_ui", "label": "quest_ui", "cat": "UI", "x": 1100, "y": 80}, {"id": "tank_base", "label": "tank_base", "cat": "Entities", "x": 668, "y": 160}, {"id": "trade_scene", "label": "trade_scene", "cat": "Scenes", "x": 20, "y": 120}, {"id": "train_inventory", "label": "train_inventory", "cat": "Inventories", "x": 884, "y": 80}, {"id": "train_manager", "label": "train_manager", "cat": "Managers", "x": 236, "y": 160}, {"id": "ui_wasd", "label": "ui_wasd", "cat": "UI", "x": 1100, "y": 120}, {"id": "unit", "label": "unit", "cat": "Entities", "x": 668, "y": 200}, {"id": "unit_action_move", "label": "unit_action_move", "cat": "State Machines", "x": 1316, "y": 40}, {"id": "unit_manager", "label": "unit_manager", "cat": "Managers", "x": 236, "y": 200}, {"id": "wall_manager", "label": "wall_manager", "cat": "Managers", "x": 236, "y": 240}];
const EDGES = [{"f": "ap_component", "t": "unit", "signals": ["ap_changed", "ap_exhausted"]}, {"f": "building_manager", "t": "combat_scene", "signals": ["building_spawned"]}, {"f": "city_inventory", "t": "trade_scene", "signals": ["city_resource_amount_changed"]}, {"f": "faction_ai", "t": "combat_scene", "signals": ["faction_finished"]}, {"f": "health_component", "t": "unit", "signals": ["died", "health_changed"]}, {"f": "hurtbox_component", "t": "unit", "signals": ["died"]}, {"f": "navigation_hud", "t": "navigation_scene", "signals": ["camera_lock_to_engine_toggle", "findengine_pressed"]}, {"f": "navigation_locomotive", "t": "navigation_train", "signals": ["tile_changed"]}, {"f": "navigation_train", "t": "train_manager", "signals": ["train_tile_changed"]}, {"f": "navigation_wagon", "t": "navigation_train", "signals": ["tile_changed"]}, {"f": "quest_manager", "t": "quest_ui", "signals": ["quest_accepted", "quest_completed", "quest_objective_updated", "quests_updated"]}, {"f": "train_inventory", "t": "trade_scene", "signals": ["wagon_resource_amount_changed", "wagon_resource_type_changed"]}, {"f": "train_manager", "t": "navigation_scene", "signals": ["train_reached_city"]}, {"f": "ui_wasd", "t": "tank_base", "signals": ["move_vector_changed"]}, {"f": "unit", "t": "combat_scene", "signals": ["unit_arrived_to_tile"]}, {"f": "unit", "t": "unit_action_move", "signals": ["unit_arrived_to_tile"]}, {"f": "unit_action_move", "t": "combat_scene", "signals": ["unit_arrived_to_tile"]}, {"f": "unit_action_move", "t": "unit", "signals": ["unit_arrived_to_tile"]}, {"f": "unit_manager", "t": "combat_scene", "signals": ["unit_arrived_to_tile", "unit_changed_orientation", "unit_reached_destination", "unit_spawned"]}, {"f": "unit_manager", "t": "unit", "signals": ["unit_arrived_to_tile"]}, {"f": "unit_manager", "t": "unit_action_move", "signals": ["unit_arrived_to_tile"]}, {"f": "wall_manager", "t": "combat_scene", "signals": ["wall_spawned"]}];

// index
const nodeMap = {};
NODES.forEach(n => nodeMap[n.id] = n);

// adjacency: node_id → [{edgeIdx, other}]
const adj = {};
NODES.forEach(n => adj[n.id] = []);
EDGES.forEach((e, i) => {
  (adj[e.f] = adj[e.f]||[]).push({i, other:e.t, dir:'out'});
  (adj[e.t] = adj[e.t]||[]).push({i, other:e.f, dir:'in'});
});

// canvas setup
const canvas = document.getElementById('c');
const DPR = window.devicePixelRatio || 1;
canvas.width  = FULL_W * DPR;
canvas.height = FULL_H * DPR;
canvas.style.width  = FULL_W + 'px';
canvas.style.height = FULL_H + 'px';
const ctx = canvas.getContext('2d');
ctx.scale(DPR, DPR);

let activeFilter = 'all';
let hovered = null;

// ── filter ───────────────────────────────────────────────
function setFilter(f) {
  activeFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => {
    const lbl = b.textContent.trim();
    b.classList.toggle('active', (f==='all'&&lbl==='All') || lbl===f);
  });
  draw();
}

function nodeAlpha(n) {
  if (activeFilter === 'all') return 1;
  return n.cat === activeFilter ? 1 : 0.12;
}

function edgeAlpha(e) {
  if (activeFilter === 'all') return 0.28;
  const fn = nodeMap[e.f], tn = nodeMap[e.t];
  if (!fn||!tn) return 0;
  return (fn.cat===activeFilter||tn.cat===activeFilter) ? 0.65 : 0.04;
}

// ── drawing ──────────────────────────────────────────────
function drawEdge(x1,y1,x2,y2, strokeCol, alpha, thick) {
  ctx.globalAlpha = alpha;
  const mx = (x1+x2)/2;
  ctx.beginPath();
  ctx.moveTo(x1,y1);
  ctx.bezierCurveTo(mx,y1, mx,y2, x2,y2);
  ctx.strokeStyle = strokeCol;
  ctx.lineWidth = thick;
  ctx.stroke();
  // arrowhead
  const angle = Math.atan2(y2-y1, x2-x1);
  const ah = thick > 1 ? 7 : 5;
  ctx.beginPath();
  ctx.moveTo(x2,y2);
  ctx.lineTo(x2-ah*Math.cos(angle-0.38), y2-ah*Math.sin(angle-0.38));
  ctx.lineTo(x2-ah*Math.cos(angle+0.38), y2-ah*Math.sin(angle+0.38));
  ctx.closePath();
  ctx.fillStyle = strokeCol;
  ctx.fill();
  ctx.globalAlpha = 1;
}

function draw() {
  ctx.clearRect(0,0,FULL_W,FULL_H);

  const hovSet = hovered ? new Set(adj[hovered].map(a=>a.i)) : null;

  // column headers
  ctx.font = '500 11px Segoe UI,system-ui,sans-serif';
  ctx.textBaseline = 'top';
  const seen = new Set();
  NODES.forEach(n => {
    if (seen.has(n.cat)) return;
    seen.add(n.cat);
    ctx.globalAlpha = 0.55;
    ctx.fillStyle = (C[n.cat]||C.Other).stroke;
    ctx.textAlign = 'left';
    ctx.fillText(n.cat, n.x, 10);
  });
  ctx.globalAlpha = 1;

  // edges
  EDGES.forEach((e,i) => {
    const fp = nodeMap[e.f], tp = nodeMap[e.t];
    if (!fp||!tp) return;
    const x1 = fp.x+NW, y1 = fp.y+NH/2;
    const x2 = tp.x,    y2 = tp.y+NH/2;
    const isHov = hovSet && hovSet.has(i);
    const baseAlpha = edgeAlpha(e);
    const col = isHov ? (C[fp.cat]||C.Other).stroke
                      : (DARK ? '#4a4a45' : '#c0bdb6');
    drawEdge(x1,y1,x2,y2, col,
             isHov ? Math.min(baseAlpha*2.2,0.95) : baseAlpha,
             isHov ? 1.8 : 0.8);
  });

  // nodes
  NODES.forEach(n => {
    const col = C[n.cat]||C.Other;
    const isHov = hovered===n.id;
    ctx.globalAlpha = nodeAlpha(n);

    ctx.beginPath();
    ctx.roundRect(n.x, n.y, NW, NH, 6);
    ctx.fillStyle = col.fill;
    ctx.fill();
    ctx.strokeStyle = isHov ? col.stroke : col.stroke+'77';
    ctx.lineWidth = isHov ? 1.8 : 0.6;
    ctx.stroke();

    ctx.fillStyle = col.text;
    ctx.font = (isHov?'500':'400')+' 12px Segoe UI,system-ui,sans-serif';
    ctx.textBaseline = 'middle';
    ctx.textAlign = 'center';
    ctx.fillText(n.label, n.x+NW/2, n.y+NH/2, NW-12);
  });

  ctx.globalAlpha = 1;
}

// ── tooltip / hover ──────────────────────────────────────
canvas.addEventListener('mousemove', ev => {
  const rect = canvas.getBoundingClientRect();
  const mx = ev.clientX - rect.left;
  const my = ev.clientY - rect.top;

  let found = null;
  for (const n of NODES) {
    if (mx>=n.x && mx<=n.x+NW && my>=n.y && my<=n.y+NH) { found=n.id; break; }
  }

  hovered = found;
  canvas.style.cursor = found ? 'pointer' : 'default';
  draw();

  const tip = document.getElementById('tip');
  if (!found) { tip.style.display='none'; return; }

  const node = nodeMap[found];
  const outEdges = EDGES.filter(e => e.f===found);
  const inEdges  = EDGES.filter(e => e.t===found);

  let html = `<b>${node.label}</b><div class="tip-cat">${node.cat}</div>`;

  if (outEdges.length) {
    html += '<div class="tip-sec">Emits to</div>';
    outEdges.forEach(e => {
      html += `<div class="tip-row">→ ${e.t}</div>`;
      e.signals.forEach(s => html += `<div class="tip-sig">${s}</div>`);
    });
  }
  if (inEdges.length) {
    html += '<div class="tip-sec">Receives from</div>';
    inEdges.forEach(e => {
      html += `<div class="tip-row">← ${e.f}</div>`;
      e.signals.forEach(s => html += `<div class="tip-sig">${s}</div>`);
    });
  }

  tip.innerHTML = html;
  tip.style.display = 'block';

  // position (keep on-screen)
  const TW=tip.offsetWidth, TH=tip.offsetHeight;
  const VW=window.innerWidth, VH=window.innerHeight;
  let tx = ev.clientX+14, ty = ev.clientY+10;
  if (tx+TW>VW) tx = ev.clientX-TW-14;
  if (ty+TH>VH) ty = ev.clientY-TH-10;
  tip.style.left = tx+'px';
  tip.style.top  = ty+'px';
});

canvas.addEventListener('mouseleave', () => {
  hovered=null;
  document.getElementById('tip').style.display='none';
  draw();
});

draw();
</script>
</body>
</html>
